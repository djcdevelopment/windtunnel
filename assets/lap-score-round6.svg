<svg viewBox="0 0 640 430" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <rect x="0" y="0" width="640" height="430" fill="#ffffff"/>

  <!-- title -->
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#1d2130">Refinement laps vs. planning score — Round 6 (192 finals re-judged)</text>
  <text x="320" y="44" text-anchor="middle" font-size="11.5" fill="#6b7280">Same outputs, re-scored under three rubrics · the judge is the confound</text>

  <!-- plot area gridlines -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="80" y1="60"  x2="600" y2="60"/>
    <line x1="80" y1="116" x2="600" y2="116"/>
    <line x1="80" y1="172" x2="600" y2="172"/>
    <line x1="80" y1="228" x2="600" y2="228"/>
    <line x1="80" y1="284" x2="600" y2="284"/>
    <line x1="80" y1="340" x2="600" y2="340"/>
  </g>
  <!-- y axis labels (score 70-95) -->
  <g font-size="11" fill="#6b7280" text-anchor="end">
    <text x="72" y="64">95</text>
    <text x="72" y="120">90</text>
    <text x="72" y="176">85</text>
    <text x="72" y="232">80</text>
    <text x="72" y="288">75</text>
    <text x="72" y="344">70</text>
  </g>
  <!-- x axis -->
  <line x1="80" y1="340" x2="600" y2="340" stroke="#9ca3af" stroke-width="1.5"/>
  <g font-size="12" fill="#374151" text-anchor="middle">
    <text x="100" y="362">Lap 1</text>
    <text x="233" y="362">Lap 2</text>
    <text x="366" y="362">Lap 3</text>
    <text x="500" y="362">Lap 4</text>
  </g>

  <!-- series: default judge, baseline (85.2, 84.2, 84.3, 74.5) -->
  <polyline points="100,150 233,161 366,160 500,270" fill="none" stroke="#d97b7b" stroke-width="2.5" stroke-dasharray="5,4"/>
  <g fill="#d97b7b">
    <circle cx="100" cy="150" r="4"/><circle cx="233" cy="161" r="4"/><circle cx="366" cy="160" r="4"/><circle cx="500" cy="270" r="4"/>
  </g>

  <!-- series: neutral judge, baseline (90.2, 87.4, 89.1, 86.5) -->
  <polyline points="100,94 233,125 366,106 500,135" fill="none" stroke="#8b95a7" stroke-width="2.5"/>
  <g fill="#8b95a7">
    <circle cx="100" cy="94" r="4"/><circle cx="233" cy="125" r="4"/><circle cx="366" cy="106" r="4"/><circle cx="500" cy="135" r="4"/>
  </g>

  <!-- series: neutral judge, concise-author (91.4, 91.4, 91.1, 91.7) -->
  <polyline points="100,80 233,80 366,84 500,77" fill="none" stroke="#4f9d69" stroke-width="2.75"/>
  <g fill="#4f9d69">
    <circle cx="100" cy="80" r="4.5"/><circle cx="233" cy="80" r="4.5"/><circle cx="366" cy="84" r="4.5"/><circle cx="500" cy="77" r="4.5"/>
  </g>

  <!-- legend -->
  <g font-size="11.5" fill="#1d2130">
    <line x1="100" y1="376" x2="122" y2="376" stroke="#4f9d69" stroke-width="2.75"/>
    <text x="128" y="380">concise-author · neutral judge — flat &amp; top at every lap</text>

    <line x1="100" y1="394" x2="122" y2="394" stroke="#8b95a7" stroke-width="2.5"/>
    <text x="128" y="398">baseline · neutral judge — mild −3.7 drift, no cliff</text>

    <line x1="100" y1="412" x2="122" y2="412" stroke="#d97b7b" stroke-width="2.5" stroke-dasharray="5,4"/>
    <text x="128" y="416">baseline · default (brevity-biased) judge — collapses to 74.5</text>
  </g>
</svg>
